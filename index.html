<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BANKR SNAKE | Standalone</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect x='2' y='2' width='28' height='28' rx='4' fill='%23E6E2D3' stroke='%23000' stroke-width='2'/><rect x='6' y='6' width='16' height='16' rx='2' fill='%23FF5C00' stroke='%23000' stroke-width='1.5'/><rect x='9' y='9' width='3' height='3' fill='%23FFD600'/><rect x='16' y='9' width='3' height='3' fill='%23FFD600'/><path d='M10 16 C 10 18, 18 18, 18 16' stroke='%23FFD600' stroke-width='2' fill='none' stroke-linecap='round'/></svg>">
    
    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');
        
        body {
            font-family: 'Courier Prime', monospace;
            background-color: #f4f4f0;
            margin: 0;
            overflow: hidden;
        }

        @keyframes diceShake {
            0% { transform: rotate(-10deg) scale(1); }
            50% { transform: rotate(10deg) scale(1.1); }
            100% { transform: rotate(-10deg) scale(1); }
        }

        .neo-shadow {
            box-shadow: 8px 8px 0px #000;
        }
        .neo-shadow-lg {
            box-shadow: 12px 12px 0px #000;
        }
        .neo-border {
            border: 4px solid #000;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- CONSTANTS ---
        const BOARD_PX = 600;
        const CELL = BOARD_PX / 10;
        const SNAKES = { 98: 78, 95: 75, 93: 73, 87: 24, 64: 60, 62: 19, 54: 34, 17: 7 };
        const LADDERS = { 1: 38, 4: 14, 9: 31, 21: 42, 28: 84, 36: 44, 51: 67, 71: 91, 80: 100 };

        const BOARD = [];
        for (let r = 0; r < 10; r++) {
            let row = [];
            for (let c = 0; c < 10; c++) {
                let num;
                if (r % 2 === 0) num = 100 - (r * 10 + c);
                else num = 100 - (r * 10 + (9 - c));
                row.push(num);
            }
            BOARD.push(row);
        }

        const squareToXY = (s) => {
            if (s < 1) return { x: -100, y: -100 };
            const r = Math.floor((100 - s) / 10);
            const numInRow = (100 - s) % 10;
            const c = (r % 2 === 0) ? numInRow : 9 - numInRow;
            return { x: c * CELL + CELL / 2, y: r * CELL + CELL / 2 };
        };

        const getDiceEmoji = (val) => {
            const emojis = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
            return emojis[val - 1] || '🎲';
        };

        // --- COMPONENTS ---
        const PixelTV = ({ scale = 1, title = "" }) => {
            const width = 320 * scale;
            const height = 280 * scale;
            return (
                <div className="relative flex flex-col items-center" style={{ width: `${width}px` }}>
                    <div className="relative" style={{ 
                        width: `${width}px`, height: `${height}px`, backgroundColor: '#E6E2D3', 
                        border: `${6 * scale}px solid #000`, borderRadius: `${32 * scale}px`,
                        boxShadow: `0 ${12 * scale}px 0px #000`, overflow: 'hidden'
                    }}>
                        <div className="absolute" style={{ top: `${24 * scale}px`, left: `${24 * scale}px`, right: `${90 * scale}px`, bottom: `${24 * scale}px`, backgroundColor: '#000', borderRadius: `${24 * scale}px`, border: `${4 * scale}px solid #000`, overflow: 'hidden' }}>
                            <div className="w-full h-full flex flex-col items-center justify-center relative" style={{ backgroundColor: '#FF5C00' }}>
                                <div className="absolute inset-0 opacity-10" style={{ background: 'repeating-linear-gradient(transparent, transparent 2px, black 2px, black 4px)' }}></div>
                                <div className="flex gap-4 mb-2" style={{ gap: `${16 * scale}px` }}>
                                    <div style={{ width: `${24 * scale}px`, height: `${24 * scale}px`, backgroundColor: '#FFD600' }} />
                                    <div style={{ width: `${24 * scale}px`, height: `${24 * scale}px`, backgroundColor: '#FFD600' }} />
                                </div>
                                <div className="flex" style={{ gap: `${4 * scale}px` }}>
                                    {[1,2,3,4,5,6].map(i => (
                                        <div key={i} style={{ 
                                            width: `${10 * scale}px`, height: `${10 * scale}px`, backgroundColor: '#FFD600', 
                                            transform: `translateY(${(i===1||i===6?4:10) * scale}px)` 
                                        }} />
                                    ))}
                                </div>
                            </div>
                        </div>
                        <div className="absolute flex flex-col items-center pt-5" style={{ top: '0', right: '0', bottom: '0', width: `${90 * scale}px` }}>
                            <div className="flex flex-col gap-2 mb-6" style={{ gap: `${6 * scale}px` }}>
                                <div style={{ width: `${40 * scale}px`, height: `${6 * scale}px`, backgroundColor: '#000', borderRadius: '4px' }} />
                                <div style={{ width: `${40 * scale}px`, height: `${6 * scale}px`, backgroundColor: '#000', borderRadius: '4px' }} />
                            </div>
                            <div className="flex gap-3">
                                <div className="relative" style={{ width: `${6 * scale}px`, height: `${80 * scale}px`, backgroundColor: '#000' }}>
                                    <div style={{ position: 'absolute', top: '20%', left: '-10px', width: '26px', height: '8px', backgroundColor: '#000' }} />
                                </div>
                                <div className="relative" style={{ width: `${6 * scale}px`, height: `${80 * scale}px`, backgroundColor: '#000' }}>
                                    <div style={{ position: 'absolute', top: '60%', left: '-10px', width: '26px', height: '8px', backgroundColor: '#000' }} />
                                </div>
                            </div>
                        </div>
                        <div className="absolute bottom-0 left-0 right-0 flex items-center px-6" style={{ backgroundColor: '#000', height: `${10 * scale}px` }}>
                            <div style={{ width: `${30 * scale}px`, height: `${6 * scale}px`, backgroundColor: '#E6E2D3', borderRadius: '3px', opacity: 0.3 }} />
                        </div>
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---
        function App() {
            const [gameState, setGameState] = useState('menu'); // menu, playing, winner
            const [pos, setPos] = useState([0, 0]);
            const [displayPos, setDisplayPos] = useState([0, 0]);
            const [turn, setTurn] = useState(0);
            const [dice, setDice] = useState(1);
            const [winner, setWinner] = useState(null);
            const [log, setLog] = useState([]);
            const [rolling, setRolling] = useState(false);
            const [animating, setAnimating] = useState(false);
            const [highlight, setHighlight] = useState(null);
            const [isSliding, setIsSliding] = useState(false);
            const [showingResult, setShowingResult] = useState(false);
            const [timeLeft, setTimeLeft] = useState(10);

            const animRef = useRef();
            const posRef = useRef(pos);
            const turnRef = useRef(turn);
            const rollingRef = useRef(rolling);
            const animatingRef = useRef(animating);
            const slidingRef = useRef(isSliding);
            const winnerRef = useRef(winner);

            useEffect(() => { posRef.current = pos; }, [pos]);
            useEffect(() => { turnRef.current = turn; }, [turn]);
            useEffect(() => { rollingRef.current = rolling; }, [rolling]);
            useEffect(() => { animatingRef.current = animating; }, [animating]);
            useEffect(() => { slidingRef.current = isSliding; }, [isSliding]);
            useEffect(() => { winnerRef.current = winner; }, [winner]);

            // Turn Timer Logic
            useEffect(() => {
                if (gameState !== 'playing' || winner !== null || rolling || showingResult || animating || isSliding) return;
                
                const timer = setInterval(() => {
                    setTimeLeft(prev => {
                        if (prev <= 1) {
                            clearInterval(timer);
                            // AUTO ROLL or SKIP turn
                            rollDice();
                            return 10;
                        }
                        return prev - 1;
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, [gameState, turn, winner, rolling, showingResult, animating, isSliding]);

            const addLog = (msg) => setLog(prev => [msg, ...prev].slice(0, 10));

            const animateMove = useCallback((player, startSq, steps, onDone) => {
                let current = startSq;
                let step = 0;
                const moveOne = () => {
                    if (step >= steps) {
                        onDone(current);
                        return;
                    }
                    current = Math.min(current + 1, 100);
                    step++;
                    setDisplayPos(prev => {
                        const next = [...prev];
                        next[player] = current;
                        return next;
                    });
                    setHighlight(current);
                    animRef.current = setTimeout(moveOne, 300);
                };
                moveOne();
            }, []);

            const animateSpecial = (player, fromSq, toSq, type, onDone) => {
                setIsSliding(true);
                setHighlight(toSq);
                setTimeout(() => {
                    setDisplayPos(prev => {
                        const next = [...prev];
                        next[player] = toSq;
                        return next;
                    });
                    setTimeout(() => {
                        setIsSliding(false);
                        onDone();
                    }, 1000);
                }, 500);
            };

            const rollDice = () => {
                if (rollingRef.current || animatingRef.current || slidingRef.current || winnerRef.current !== null) return;
                
                setRolling(true);
                setTimeLeft(10);
                let count = 0;
                const finalDice = Math.ceil(Math.random() * 6);
                
                const interval = setInterval(() => {
                    setDice(Math.ceil(Math.random() * 6));
                    count++;
                    if (count >= 12) {
                        clearInterval(interval);
                        setDice(finalDice);
                        setRolling(false);
                        setShowingResult(true);

                        // Pause 1.2s so player can see the result
                        setTimeout(() => {
                            setShowingResult(false);
                            setAnimating(true);
                            
                            const currentTurn = turnRef.current;
                            const curPos = posRef.current[currentTurn];
                            const newRaw = curPos + finalDice;

                            if (newRaw > 100) {
                                addLog(`P${currentTurn+1}: Stays at ${curPos}`);
                                setTimeout(() => {
                                    setAnimating(false);
                                    setTurn(1 - currentTurn);
                                    setTimeLeft(10);
                                }, 1000);
                                return;
                            }

                            addLog(`P${currentTurn+1}: ${curPos||'Start'} +${finalDice} → ${newRaw}`);

                            animateMove(currentTurn, curPos, finalDice, (landed) => {
                                if (SNAKES[landed]) {
                                    const to = SNAKES[landed];
                                    animateSpecial(currentTurn, landed, to, 'snake', () => {
                                        setPos(prev => { const n=[...prev]; n[currentTurn]=to; return n; });
                                        addLog(`  🐍 ${landed}→${to}`);
                                        finishTurn(currentTurn, to);
                                    });
                                } else if (LADDERS[landed]) {
                                    const to = LADDERS[landed];
                                    animateSpecial(currentTurn, landed, to, 'ladder', () => {
                                        setPos(prev => { const n=[...prev]; n[currentTurn]=to; return n; });
                                        addLog(`  🪜 ${landed}→${to}`);
                                        finishTurn(currentTurn, to);
                                    });
                                } else {
                                    setPos(prev => { const n=[...prev]; n[currentTurn]=landed; return n; });
                                    finishTurn(currentTurn, landed);
                                }
                            });
                        }, 1200);
                    }
                }, 75);
            };

            const finishTurn = (player, landed) => {
                if (landed === 100) {
                    setWinner(player);
                    setAnimating(false);
                    return;
                }
                setTimeout(() => {
                    setAnimating(false);
                    setTurn(1 - player);
                    setTimeLeft(10);
                }, 600);
            };

            const reset = () => {
                setPos([0, 0]); setDisplayPos([0, 0]); setTurn(0); setWinner(null);
                setLog([]); setRolling(false); setAnimating(false); setShowingResult(false); setGameState('playing');
                setTimeLeft(10);
            };

            const p1xy = displayPos[0] > 0 ? squareToXY(displayPos[0]) : null;
            const p2xy = displayPos[1] > 0 ? squareToXY(displayPos[1]) : null;

            if (gameState === 'menu') {
                return (
                    <div className="fixed inset-0 flex flex-col items-center justify-center gap-12 p-4">
                        <div className="text-[48px] font-black tracking-[8px] text-black drop-shadow-[4px_4px_0px_#FF4911] text-center">BANKR SNAKE</div>
                        <PixelTV />
                        <button onClick={() => setGameState('playing')} className="neo-border bg-[#00FF66] px-12 py-5 text-2xl font-black neo-shadow-lg active:translate-x-1 active:translate-y-1 active:shadow-none transition-all uppercase tracking-widest">
                            START GAME
                        </button>
                        <a href="https://x.com/bankrsnake" target="_blank" className="font-bold text-black border-b-4 border-black hover:bg-[#FFE100] transition-colors tracking-widest">
                            @BANKRSNAKE
                        </a>
                    </div>
                );
            }

            return (
                <div className="fixed inset-0 flex items-center justify-center gap-8 p-6">
                    {/* LEFT PANEL: BOARD */}
                    <div className="relative neo-border bg-black neo-shadow-lg shrink-0">
                        <svg width={BOARD_PX} height={BOARD_PX} className="bg-[#f5f0e0]">
                            {/* Board Cells */}
                            {BOARD.map((row, ri) => row.map((num, ci) => {
                                const palette = ['#FFE100', '#00FF66', '#3300FF', '#FF4911', '#FF00FF', '#fff', '#00CCFF'];
                                const colorIdx = (ri * 3 + ci * 7) % palette.length;
                                const cellColor = num === 100 ? '#00FF66' : num === 1 ? '#FFE100' : palette[colorIdx];
                                const textColor = (cellColor === '#3300FF' || cellColor === '#FF4911') ? '#fff' : '#000';
                                return (
                                    <g key={num}>
                                        <rect x={ci*CELL} y={ri*CELL} width={CELL} height={CELL} fill={highlight===num?'#fff':cellColor} stroke="#000" strokeWidth="2"/>
                                        <text x={ci*CELL+6} y={ri*CELL+16} fontSize="12" fontWeight="900" fill={textColor}>{num}</text>
                                        {num===100 && <text x={ci*CELL+CELL/2} y={ri*CELL+CELL/2} fontSize="24" textAnchor="middle" dominantBaseline="middle">🏁</text>}
                                        {num===1 && <text x={ci*CELL+CELL/2} y={ri*CELL+CELL/2+10} fontSize="20" textAnchor="middle">🚀</text>}
                                    </g>
                                );
                            }))}

                            {/* Ladders */}
                            {Object.entries(LADDERS).map(([b, t]) => {
                                const start = squareToXY(Number(b)), end = squareToXY(t);
                                return (
                                    <g key={`l${b}`}>
                                        <line x1={start.x-4} y1={start.y} x2={end.x-4} y2={end.y} stroke="#000" strokeWidth="8"/>
                                        <line x1={start.x+4} y1={start.y} x2={end.x+4} y2={end.y} stroke="#000" strokeWidth="8"/>
                                        <line x1={start.x-4} y1={start.y} x2={end.x-4} y2={end.y} stroke="#00FF66" strokeWidth="2"/>
                                        <line x1={start.x+4} y1={start.y} x2={end.x+4} y2={end.y} stroke="#00FF66" strokeWidth="2"/>
                                    </g>
                                );
                            })}

                            {/* Snakes */}
                            {Object.entries(SNAKES).map(([h, t], i) => {
                                const head = squareToXY(Number(h)), tail = squareToXY(t);
                                const d = `M${head.x},${head.y} Q${(head.x+tail.x)/2 + (i%2?40:-40)},${(head.y+tail.y)/2} ${tail.x},${tail.y}`;
                                return (
                                    <g key={`s${h}`}>
                                        <path d={d} stroke="#000" strokeWidth="12" fill="none" strokeLinecap="round"/>
                                        <path d={d} stroke="#FF4911" strokeWidth="6" fill="none" strokeLinecap="round"/>
                                        <circle cx={head.x} cy={head.y} r="8" fill="#FF4911" stroke="#000" strokeWidth="2"/>
                                    </g>
                                );
                            })}

                            {/* Tokens */}
                            {p2xy && <circle cx={p2xy.x+8} cy={p2xy.y} r="12" fill="#FF4911" stroke="#000" strokeWidth="3" style={{ transition: isSliding?'all 1s':'all 0.3s' }}/>}
                            {p1xy && <circle cx={p1xy.x-8} cy={p1xy.y} r="12" fill="#3300FF" stroke="#000" strokeWidth="3" style={{ transition: isSliding?'all 1s':'all 0.3s' }}/>}
                        </svg>

                        {/* DICE OVERLAY */}
                        {(rolling || showingResult) && (
                            <div className="absolute inset-0 bg-black/40 flex items-center justify-center z-50">
                                <div style={{ 
                                    fontSize:120, color:'#FFE100', textShadow:'6px 6px 0px #000',
                                    animation: rolling ? 'diceShake 0.15s infinite' : 'none',
                                    transform: showingResult ? 'scale(1.2)' : 'scale(1)',
                                    transition: 'transform 0.2s'
                                }}>{getDiceEmoji(dice)}</div>
                            </div>
                        )}

                        {/* ROLL ACTION */}
                        {!winner && !rolling && !showingResult && !animating && !isSliding && (
                            <div className="absolute inset-0 flex flex-col items-center justify-center z-40 pointer-events-none">
                                <button onClick={rollDice} className="pointer-events-auto neo-border bg-[#00FF66] px-10 py-4 text-3xl font-black neo-shadow active:translate-x-1 active:translate-y-1 active:shadow-none transition-all uppercase tracking-widest">
                                    ROLL P{turn+1}
                                </button>
                                <div className="mt-4 bg-white neo-border px-4 py-1 text-xl font-bold neo-shadow text-[#FF4911]">{timeLeft}s</div>
                            </div>
                        )}
                    </div>

                    {/* RIGHT PANEL: HUD */}
                    <div className="w-64 flex flex-col gap-4">
                        <div className="flex justify-center"><PixelTV scale={0.6} /></div>

                        {/* Player Cards */}
                        {[0,1].map(i => (
                            <div key={i} className={`p-4 neo-border neo-shadow transition-colors ${turn===i&&!winner?'bg-[#FFE100]':'bg-white'}`}>
                                <div className="flex justify-between font-black text-sm">
                                    <span className={i===0?'text-[#3300FF]':'text-[#FF4911]'}>P{i+1} {i===0?'(BLUE)':'(RED)'}</span>
                                    <span>SQ: {displayPos[i]}</span>
                                </div>
                                <div className="mt-2 h-2 bg-black border border-black overflow-hidden">
                                    <div className={`h-full transition-all duration-300 ${i===0?'bg-[#3300FF]':'bg-[#FF4911]'}`} style={{ width:`${displayPos[i]}%` }} />
                                </div>
                            </div>
                        ))}

                        {/* WINNER CARD */}
                        {winner !== null && (
                            <div className="bg-[#FF4911] neo-border p-4 text-center neo-shadow">
                                <div className="text-3xl mb-1">🏆</div>
                                <div className="text-white font-black text-lg tracking-tighter uppercase">PLAYER {winner+1} WINS!</div>
                                <button onClick={reset} className="mt-4 bg-[#3300FF] text-white px-4 py-2 font-bold neo-border neo-shadow-sm text-xs uppercase active:translate-x-1 active:translate-y-1">PLAY AGAIN</button>
                            </div>
                        )}

                        {/* LOG PANEL */}
                        <div className="flex-1 bg-white neo-border p-3 neo-shadow overflow-hidden">
                            <div className="text-[10px] font-bold text-gray-400 mb-2 uppercase tracking-widest border-b border-black/10 pb-1">Game Feed</div>
                            <div className="flex flex-col gap-1">
                                {log.map((m, i) => (
                                    <div key={i} className="text-[11px] font-bold leading-tight border-l-2 border-black pl-2 py-0.5">{m}</div>
                                ))}
                            </div>
                        </div>

                        <button onClick={() => setGameState('menu')} className="bg-white neo-border py-2 font-black text-xs neo-shadow hover:bg-red-50 transition-colors uppercase tracking-widest active:translate-x-1 active:translate-y-1">
                            ← EXIT
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
